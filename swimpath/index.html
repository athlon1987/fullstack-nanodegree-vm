<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1722" />
  <meta name="description" content="Swim Shark — track, coach and predict youth swimming development." />
  <!-- iPhone: full-screen "Add to Home Screen" web app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Swim Shark" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Swim Shark</title>
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div class="brand">
        <span class="logo"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><g fill="#fff"><path d="M16,54 C24,44 40,41 58,43 C70,44 78,48 84,51 C78,54 70,58 58,59 C40,61 24,58 16,54 Z"/><polygon points="84,50 98,38 90,51 98,64 84,55"/><polygon points="44,42 54,23 63,43"/><polygon points="34,57 40,71 49,56"/></g><circle cx="27" cy="51" r="2.6" fill="#0a0a0a"/></svg></span>
        <span>Swim Shark<small>YOUTH PROGRESS</small></span>
      </div>
      <span class="spacer"></span>
      <button class="iconbtn" id="cloudBtn" title="Sync status" aria-label="Sync status">☁️</button>
      <button class="iconbtn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">🌙</button>
    </header>

    <main id="view" class="fadein"><!-- rendered by app.js --></main>
  </div>

  <nav class="nav">
    <div class="inner">
      <button class="navbtn active" data-tab="home"><span class="ic">🏠</span>Home</button>
      <button class="navbtn" data-tab="strokes"><span class="ic">🏊</span>Strokes</button>
      <button class="navbtn" data-tab="times"><span class="ic">⏱️</span>Times</button>
      <button class="navbtn" data-tab="progress"><span class="ic">📈</span>Progress</button>
      <button class="navbtn" data-tab="profile"><span class="ic">👤</span>Profile</button>
    </div>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="js/store.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/app.js"></script>
  <script type="module" src="js/cloud.js"></script>
</body>
</html>
