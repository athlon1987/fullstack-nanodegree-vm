name: Deploy to GitHub Pages

on:
  push:
    branches: [master, claude/learning-app-curriculum-wdn7oh]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate curriculum content
        run: npm run validate
      - name: Build
        env:
          BASE_PATH: /fullstack-nanodegree-vm/
        run: npm run build
      # Pages must already be enabled with Source = "GitHub Actions" in repo
      # Settings (the Actions token cannot enable it itself). Once enabled, this
      # just reads the existing site config.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
