name: Deploy SwimPath to GitHub Pages

on:
  push:
    branches: [claude/swimpath-progress-app-w59c2n]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload SwimPath as the site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: swimpath

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
